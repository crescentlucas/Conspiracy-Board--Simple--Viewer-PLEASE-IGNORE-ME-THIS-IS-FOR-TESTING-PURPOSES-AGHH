<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DR Conspiracy Board Viewer</title>
    <link rel="stylesheet" href="styles.css?v=mobile-controls-4">
  </head>
  <body class="viewer-mode public-viewer">
    <main class="app-shell">
      <button class="mode-toggle" id="toggleMode" type="button">Viewer mode</button>

      <section id="welcome" class="screen welcome-screen" aria-labelledby="welcome-title">
        <div class="welcome-copy">
          <p class="eyebrow">DR Conspiracy Board</p>
          <h1 id="welcome-title">Welcome</h1>
          <form class="new-board-form dev-only" id="newBoardForm">
            <label for="newBoardName">New corkboard</label>
            <div class="inline-controls">
              <input id="newBoardName" name="boardName" type="text" autocomplete="off" placeholder="Case name">
              <button class="primary-button" type="submit">Create</button>
            </div>
            <label for="newBoardThumbnail">Thumbnail</label>
            <input id="newBoardThumbnail" name="boardThumbnail" type="file" accept="image/*">
          </form>
          <nav class="board-menu" id="boardMenu" aria-label="Choose a corkboard"></nav>
        </div>
      </section>

      <section id="corkboard-screen" class="screen corkboard-screen" aria-label="Corkboard workspace">
        <header class="board-toolbar">
          <div class="toolbar-group">
            <a class="icon-link" href="#welcome" aria-label="Return to welcome">Back</a>
            <h2 id="currentBoardName">Corkboard</h2>
          </div>
          <div class="toolbar-group">
            <button class="icon-link dev-only" id="renameBoardButton" type="button">Rename</button>
            <button class="icon-link dev-only" id="changeBoardThumbnailButton" type="button">Thumbnail</button>
            <input id="boardThumbnailInput" class="hidden-file-input dev-only" type="file" accept="image/*">
            <button class="icon-link danger-button dev-only" id="deleteBoardButton" type="button">Delete board</button>
            <button class="icon-link dev-only" id="toggleBlockForm" type="button">Add block</button>
            <button class="icon-link dev-only" id="toggleConnectMode" type="button">Connect</button>
            <button class="icon-link dev-only" id="toggleUnconnectMode" type="button">Unconnect</button>
            <select class="color-select dev-only" id="connectionColor" aria-label="Connection color">
              <option value="" selected>White</option>
              <option value="red">Red</option>
              <option value="orange">Orange</option>
              <option value="yellow">Yellow</option>
              <option value="blue">Blue</option>
              <option value="green">Green</option>
              <option value="purple">Purple</option>
              <option value="cyan">Cyan</option>
            </select>
            <button class="icon-link" id="toggleSettings" type="button">Settings</button>
            <div class="viewer-focus-counter" id="viewerFocusCounter" aria-live="polite" hidden>(1/1)</div>
            <div class="zoom-readout" aria-live="polite">100%</div>
          </div>
        </header>

        <aside class="settings-panel" id="settingsPanel" aria-label="Settings">
          <div class="panel-heading">
            <h3>Settings</h3>
            <button class="panel-close" id="closeSettings" type="button" aria-label="Close settings">X</button>
          </div>
          <label for="duplicateLineStyle">Duplicate lines</label>
          <select id="duplicateLineStyle">
            <option value="separate">Separate full lines</option>
            <option value="dotted">Alternate dotted lines</option>
          </select>
          <label class="settings-check">
            <input id="routeAroundBlocks" type="checkbox">
            <span>Avoid blocks with lines</span>
          </label>
          <label class="settings-check">
            <input id="hideConnections" type="checkbox">
            <span>Hide connections</span>
          </label>
          <label class="settings-check">
            <input id="hideConnectionColors" type="checkbox">
            <span>Hide connection colors</span>
          </label>
          <label class="settings-check">
            <input id="hideTextColors" type="checkbox">
            <span>Hide text colors</span>
          </label>
          <label class="settings-check">
            <input id="animateJustificationReveal" type="checkbox" checked>
            <span>Animate justifications</span>
          </label>
        </aside>

        <aside class="block-panel" id="blockPanel" aria-label="New block form">
          <form id="blockForm">
            <div class="panel-heading">
              <h3 id="blockPanelTitle">New block</h3>
              <button class="panel-close" id="cancelBlockEdit" type="button" aria-label="Close block form">X</button>
            </div>

            <label for="blockTitle">Title</label>
            <input id="blockTitle" name="blockTitle" type="text" autocomplete="off" placeholder="Optional block title">

            <label for="blockText">Text</label>
            <textarea id="blockText" name="blockText" rows="7" placeholder="Woah! cool list&#10;- [red]one cool[/red]&#10;- [orange]two cool[/orange]&#10;- [cyan]three cool[/cyan]"></textarea>
            <p class="format-note">Use colors like [red]text[/red], sizes like [size:24]text[/size], and Justify on saved blocks.</p>

            <div class="format-tools">
              <label for="formatTextInput">Format helper</label>
              <input id="formatTextInput" type="text" autocomplete="off" placeholder="Text to insert">
              <div class="format-row">
                <select id="formatColorSelect" aria-label="Text color">
                  <option value="red">Red</option>
                  <option value="orange">Orange</option>
                  <option value="yellow">Yellow</option>
                  <option value="blue">Blue</option>
                  <option value="green">Green</option>
                  <option value="purple">Purple</option>
                  <option value="cyan">Cyan</option>
                </select>
                <button class="icon-link" id="insertColorButton" type="button">Color</button>
              </div>
              <div class="format-row">
                <select id="formatSizeSelect" aria-label="Font size">
                  <option value="14">14</option>
                  <option value="18">18</option>
                  <option value="22" selected>22</option>
                  <option value="28">28</option>
                  <option value="36">36</option>
                  <option value="48">48</option>
                </select>
                <button class="icon-link" id="insertSizeButton" type="button">Font size</button>
              </div>
              <button class="icon-link" id="insertJustifyButton" type="button">Justify</button>
              <div class="link-builder">
                <label for="linkBoardSelect">Link target corkboard</label>
                <select id="linkBoardSelect"></select>
                <label for="linkBlockSelect">Specific block</label>
                <select id="linkBlockSelect"></select>
                <button class="icon-link" id="insertLinkButton" type="button">Link to corkboard</button>
              </div>
            </div>

            <label class="file-label" for="blockImage">Image</label>
            <input id="blockImage" name="blockImage" type="file" accept="image/*">
            <p class="image-note" id="currentImageNote">Choose an image to add or replace the current image.</p>

            <button class="danger-button block-delete-action" id="deleteBlockButton" type="button" hidden>Delete block</button>
            <button class="primary-button" id="blockSubmitButton" type="submit">Place block</button>
          </form>
        </aside>

        <div class="board-viewport" id="boardViewport">
          <div class="board" id="board"></div>
        </div>

        <div class="mobile-viewer-controls" id="mobileViewerControls" aria-label="Mobile viewer controls">
          <button class="mobile-control-button" id="viewerPreviousFocus" type="button" aria-label="Previous connected block" title="Previous connected block">&lt;</button>
          <button class="mobile-control-button" id="zoomOutButton" type="button" aria-label="Zoom out" title="Zoom out">-</button>
          <button class="mobile-control-button" id="zoomInButton" type="button" aria-label="Zoom in" title="Zoom in">+</button>
          <button class="mobile-control-button" id="viewerNextFocus" type="button" aria-label="Next connected block" title="Next connected block">&gt;</button>
        </div>
      </section>
    </main>

    <script src="app.js?v=mobile-controls-4"></script>
  </body>
</html>
